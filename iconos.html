<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iconos Redes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<style>

.caja{
border:1px solid gray;
padding:30px;
text-align:center;
}

.icono{
font-size:40px;
}

.facebook{
color:#1877f2;
}

.whatsapp{
color:#25D366;
}

.instagram{
color:#E4405F;
}

</style>
</head>

<body>

<div class="container mt-5">
<div class="row">

<div class="col-md-4">
<div class="caja">
<h4>Facebook</h4>
<i class="bi bi-facebook icono facebook"></i>
</div>
</div>

<div class="col-md-4">
<div class="caja">
<h4>Whatsapp</h4>
<i class="bi bi-whatsapp icono whatsapp"></i>
</div>
</div>

<div class="col-md-4">
<div class="caja">
<h4>Instagram</h4>
<i class="bi bi-instagram icono instagram"></i>
</div>
</div>

</div>
</div>

</body>
</html>
